<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickDeal - 1:1 채팅</title>
    <link rel="stylesheet" href="../css/chatstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-wrapper">
        <header class="chat-header">
            <div class="header-left">
                <span class="logo"><span class="white-text">Pick</span>Deal</span>
                <div class="location-tag">
                    <i class="fa-solid fa-location-dot"></i>
                    <span id="current-location">Yeoksam-dong</span>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="header-icons">
                <i class="fa-regular fa-comment"></i>
                <i class="fa-regular fa-bell"></i>
                <i class="fa-regular fa-circle-user"></i>
            </div>
        </header>

        <div class="chat-container">
            <aside class="chat-list">
                <div class="list-title">Chats</div>
                <div class="chat-item active">
                    <i class="fa-solid fa-circle-user profile-icon"></i>
                    <div class="chat-info">
                        <div class="user-meta">
                            <span class="user-name">구매자</span>
                            <span class="time">오후 3:21</span>
                        </div>
                        <p class="last-msg">iPhone 13 mini Starlight 128G</p>
                    </div>
                </div>
            </aside>

            <main class="chat-main">
                <div class="chat-top-bar">
                    <div class="active-user">
                        <i class="fa-solid fa-circle-user"></i>
                        <span>[홍길동]</span>
                    </div>
                    <div class="top-icons">
                        <i class="fa-solid fa-phone"></i>
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>
                </div>
                
                <div class="message-area" id="chat-messages">
                    <div class="msg-row received">
                        <i class="fa-solid fa-circle-user"></i>
                       
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-container">
                        <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) {sendMessage();}">
                        <i class="fa-solid fa-paper-plane send-icon" onclick="sendMessage()"></i>
                    </div>
                    <div class="input-tools">
                        <i class="fa-solid fa-location-dot"></i>
                        <i class="fa-regular fa-image"></i>
                        <i class="fa-regular fa-square-plus"></i>
                    </div>
                </div>
            </main>

            <aside class="product-summary">
                <div class="summary-card">
                    <div class="product-img-box">
                        <img src="../images/iphone.png" alt="상품 이미지">
                    </div>
                    <div class="summary-info">
                        <p class="summary-title">iPhone 13 mini Starlight 128G</p>
                        <p class="summary-price">450,000원</p>
                    </div>
                   <button class="more-btn" onclick="location.href='detailpage.html'">더보기</button>
                </div>
            </aside>
        </div>
    </div>

    <script src="../js/chat.js"></script>
</body>
</html>
