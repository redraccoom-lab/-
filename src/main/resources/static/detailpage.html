<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickDeal - 상세 페이지</title>
    
    <link rel="stylesheet" href="detailpage.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="white-text">Pick</span>Deal
            </div>
            <div class="user-nav">
                <a href="index.html" class="nav-item">메인</a>
                <a href="#" class="nav-item">마이페이지</a>
            </div>
        </header>

        <main class="detail-card">
            <div class="detail-content">
                
                <div class="product-visual">
                    <div class="img-display">
                        <img src="/images/iphone-detail.jpg" alt="아이폰 13">
                    </div>
                    
                    <div class="product-metadata-bar">
                        <div class="metadata-item">
                            <i class="fa-regular fa-clock"></i>
                            <span>3시간 전 등록</span>
                        </div>
                        <div class="divider">|</div>
                        <div class="metadata-item">
                            <i class="fa-regular fa-eye"></i>
                            <span>조회 12</span>
                        </div>
                        <div class="divider">|</div>
                        <div class="metadata-item">
                            <i class="fa-regular fa-heart"></i>
                            <span>찜 7</span>
                        </div>
                    </div>
                </div>

                <div class="product-info">
                    <h2 class="product-title">아이폰 13 판매</h2>
                    <div class="price-tag">300,000원 </div>
                    
                    <div class="spec-list">
                        <div class="spec-item">
                            <span class="spec-label">지역</span>
                            <span class="spec-value">대전 유성구</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">판매자</span>
                            <span class="spec-value">홍길동</span>
                        </div>
                    </div>

                    <button class="action-btn">채팅하기</button>
                </div>
            </div>

            <div class="description-section">
                <h3 class="desc-title">상품 설명</h3>
                <p class="desc-text">
                    상태 아주 깨끗합니다. 박스 풀구성이며 기능상 하자 전혀 없습니다.<br>
                    배터리 효율도 좋고 강화유리 필름 붙여져 있습니다. 편하게 연락주세요!
                </p>
            </div>
        </main>
    </div>

</body>
</html>
